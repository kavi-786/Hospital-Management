{% extends "base.html" %}

{% block title %}Login - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white text-center pt-4 pb-0 border-0">
                <i class="fa-solid fa-user-lock fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Welcome Back</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" name="username" class="form-control border-start-0 bg-light" required placeholder="Enter username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0 bg-light" required placeholder="Enter password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Login</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">Register as Patient</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
