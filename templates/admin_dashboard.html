{% extends "base.html" %}

{% block title %}Admin Dashboard - HMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
    <h2><i class="fa-solid fa-gauge-high text-primary me-2"></i>Admin Dashboard</h2>
</div>

<div class="row mb-4">
    <div class="col-md-4">
        <div class="card text-white bg-primary shadow-sm h-100 border-0 rounded-3">
            <div class="card-body d-flex align-items-center">
                <div class="me-3">
                    <i class="fa-solid fa-user-doctor fa-3x opacity-75"></i>
                </div>
                <div>
                    <h5 class="card-title mb-0">Total Doctors</h5>
                    <h2 class="display-6 fw-bold mb-0">{{ d_count }}</h2>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success shadow-sm h-100 border-0 rounded-3">
            <div class="card-body d-flex align-items-center">
                <div class="me-3">
                    <i class="fa-solid fa-bed-pulse fa-3x opacity-75"></i>
                </div>
                <div>
                    <h5 class="card-title mb-0">Total Patients</h5>
                    <h2 class="display-6 fw-bold mb-0">{{ p_count }}</h2>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-info shadow-sm h-100 border-0 rounded-3">
            <div class="card-body d-flex align-items-center">
                <div class="me-3">
                    <i class="fa-solid fa-calendar-check fa-3x opacity-75"></i>
                </div>
                <div>
                    <h5 class="card-title mb-0">Total Appointments</h5>
                    <h2 class="display-6 fw-bold mb-0">{{ a_count }}</h2>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-header bg-white border-0 pt-4">
                <h5 class="fw-bold"><i class="fa-solid fa-users-cog text-primary me-2"></i>Quick Actions</h5>
            </div>
            <div class="card-body">
                <div class="d-grid gap-3">
                    <a href="{{ url_for('admin.manage_staff') }}" class="btn btn-outline-primary text-start p-3 fw-bold rounded-3">
                        <i class="fa-solid fa-plus-circle me-2"></i> Add New Staff Member
                    </a>
                    <a href="{{ url_for('admin.manage_staff') }}" class="btn btn-outline-secondary text-start p-3 fw-bold rounded-3">
                        <i class="fa-solid fa-users me-2"></i> View All Staff
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
