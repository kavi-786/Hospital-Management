{% extends "base.html" %}

{% block title %}Prescribe - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-white pt-4 pb-2 border-0">
                <h4 class="fw-bold"><i class="fa-solid fa-file-prescription text-primary me-2"></i>Add Prescription</h4>
                <p class="text-muted mb-0">For Patient: <strong>{{ appointment.patient_name }}</strong></p>
            </div>
            <div class="card-body bg-light p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Diagnosis</label>
                        <textarea name="diagnosis" rows="3" class="form-control" required placeholder="Enter diagnosis here..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Medicines</label>
                        <textarea name="medicines" rows="3" class="form-control" required placeholder="e.g. Paracetamol 500mg - 1x/day"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Additional Notes</label>
                        <textarea name="notes" rows="2" class="form-control" placeholder="Optional notes..."></textarea>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('doctor.dashboard') }}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary shadow">Save Prescription & Complete Appointment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
