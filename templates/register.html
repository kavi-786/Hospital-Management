{% extends "base.html" %}

{% block title %}Register - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white text-center pt-4 pb-0 border-0">
                <i class="fa-solid fa-user-plus fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Patient Registration</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Full Name</label>
                            <input type="text" name="name" class="form-control bg-light" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Username</label>
                            <input type="text" name="username" class="form-control bg-light" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Email</label>
                            <input type="email" name="email" class="form-control bg-light">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Phone Number</label>
                            <input type="text" name="phone" class="form-control bg-light" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Password</label>
                        <input type="password" name="password" class="form-control bg-light" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Register</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
